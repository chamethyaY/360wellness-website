    <style>
        
        /* Sitemap chart styles */
        .sitemap-container {
            width: 100%;
            max-width: 1400px;
            margin: 2rem auto;
            padding: 1rem;
        }

        .sitemap-svg {
            width: 100%;
            height: auto;
            min-height: 400px;
        }

        a:focus, button:focus, .node:focus, .dropdown-toggle:focus {
            box-shadow: 0px 0px 10px rgba(0, 127, 91, 0.8);
            border-radius: 6px;
        }

        /* For SVG nodes */
        .node:focus {
            stroke: #C5C7C3; /* Gold stroke */
            stroke-width: 3;
            fill: #005A40; /* Darker green */
        }

        .node {
            fill: #144235;
            border-radius:10px ;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .node:hover, .node:focus {
            fill: #007F5B;
        }

        .node-text {
            fill: white;
            font-size: 14px;
            pointer-events: none;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .connection {
            stroke: #144235;
            stroke-width: 2;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .sitemap-svg {
                height: 600px;
            }
        }
    </style>
</head>
